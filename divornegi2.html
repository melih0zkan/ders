<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Document</title>
    <style>
        .ust {
            width: 500px;
            height: 100px;
            background: blue;
            display: block;
            border: 5px solid red;
        }
        .orta {
            width: 500px;
            height: 200px;
            background: plum;
            display: flex;
            border: 5px solid red;
        }
        .alt {
            width: 500px;
            height: 100px;
            background: blue;
            display: flex;
            border: 5px solid red;
        }
        .menu {
            display: flex;
            margin-top: 2px;
        }
        .menu ul {
            margin: 0;
            padding: 0;
        }
        .menu ul li {
            list-style-type: none;
            border-style: solid;
            width: 100px;
            font-size: 10px;
            padding: 5px;
            margin-bottom: 5px;
        }
        .metin {
            margin-left: 20px;
        }
        .metin ol li {
            list-style-type: disc;
        }
    </style>
</head>
<body>
    <div class="genel">
        <div class="ust"></div>
        <div class="orta">
            <div class="menu">
                <ul>
                    <li>MENU-1</li>
                    <li>MENU-2</li>
                    <li>MENU-3</li>
                    <li>MENU-4</li>
                </ul>
            </div>
            <div class="metin"> 
                <b>Bu uygulama aşağıdaki özelliklere değinilmiştir.</b>
                <ol>
                    <li>Zemin Özellikler</li>
                    <li>Font Özellikler</li>
                    <li>Kutu Modeli Özellikleri</li>
                    <li>Pozisyon Özellikler</li>
                    <li>Liste Özellikler</li>
                </ol>
            </div>
            

        </div>
        <div class="alt"></div>
    </div>
</body>
</html>
