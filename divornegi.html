<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Document</title>
    <style>
        body {
            background: white;
            font-size: 25px;
            font-family: 'Courier New', Courier, monospace;
            text-align: center;
            background-color: turquoise;
            justify-content: center;
        }

        .genel {
            width: 800px;
            margin: auto
        }
        .ust {
            display: flex;
        }
        .logo {
            float: left;
            width: 300px;
            height: 150px;
            border: 2px solid;
            background: white;
        }
        .menu {
            float: left;
            width: 500px;
            height: 150px;
            border: 2px solid ;
            margin-left: 10px;
            background: white;
        }
        .icerik {
            height: 400px;
            border: 2px solid;
            margin-top: 10px;
            background: white;
        }
        .alt {
            border: 2px solid;
            margin-top: 10px;
            height: 50px;
            background: white;
        }
    </style>
</head>
<body>
    <div class="genel">
        <div class="ust">
            <div class="logo">LOGO</div>
            <div class="menu">MENÜ</div>
        </div>
        <div class="icerik">İÇERİK</div>
        <div class="alt">ALT</div>
    </div>
</body>
</html>
