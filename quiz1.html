<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>renkli kutu</title>
    <style>
        #ana {
            width: 600px;
            font-size: 32px;
            color: #000;
            font-family: Arial, Helvetica, sans-serif;
            margin: 0 auto;
        }

        #ust {
            height: 100px;
            background-color: #ccc;
            margin-bottom: 5px;
            text-align: center;
            line-height: 100px;
        }

        #orta-alan {
            display: flex;
            margin-bottom: 5px;
        }

        #sol {
            width: 125px;
            height: 350px;
            background-color: #ff6;
            text-align: center;
            line-height: 350px;
        }

        #orta {
            width: 350px;
            height: 350px;
            background-color: #59BDFF;
            text-align: center;
            line-height: 350px;
        }

        #sag {
            width: 125px;
            height: 350px;
            background-color: #ff6;
            text-align: right;
            line-height: 350px;
            padding-right: 10px;
        }

        #alt {
            height: 100px;
            background-color: #aaa;
            text-align: center;
            line-height: 100px;
            margin-top: 5px;
        }
    </style>
</head>
<body>
    <div id="ana">
        <div id="ust">ÜST</div>
        <div id="orta-alan">
            <div id="sol">SOL</div>
            <div id="orta">ORTA</div>
            <div id="sag">SAG</div>
        </div>
        <div id="alt">ALT</div>
    </div>
</body>
</html>
